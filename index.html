<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05060d" />
<title>宮古島の星空シミュレータ</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05060d; font-family: system-ui, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; overscroll-behavior: none; }
  #app { position: fixed; inset: 0; }
  #app canvas { touch-action: none; display: block; } /* let JS own gestures */
  #ui {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(12, 16, 32, 0.78); backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 160, 255, 0.25); border-radius: 14px;
    padding: 16px 18px; color: #dfe6ff; width: 290px; max-width: calc(100vw - 32px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #ui h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: .02em; }
  #ui p.sub { font-size: 11.5px; margin: 0 0 14px; color: #9fb0d8; line-height: 1.5; }
  .row { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 13px; }
  .row label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* Long-option <select>s default to fit-content width and overflow the panel.
     Clamp them to the row's available space so they stay inside #ui. */
  .row select { flex: 1.4; min-width: 0; max-width: 100%; background: rgba(20,30,60,0.55);
    border: 1px solid rgba(120,160,255,0.35); border-radius: 8px; color: #dfe6ff;
    padding: 5px 8px; font-size: 12px; cursor: pointer; }
  button.toggle {
    background: rgba(80,120,255,0.18); border: 1px solid rgba(120,160,255,0.4);
    color: #dfe6ff; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 12px;
    transition: background .15s;
  }
  button.toggle.on { background: rgba(100,160,255,0.45); }
  button.toggle:hover { background: rgba(120,160,255,0.35); }
  .seg { display: flex; gap: 0; margin: 4px 0 12px; border: 1px solid rgba(120,160,255,0.4); border-radius: 10px; overflow: hidden; }
  .segbtn { flex: 1; background: transparent; color: #aebbe0; border: none; padding: 9px 4px; font-size: 13px; cursor: pointer; transition: background .15s; }
  .segbtn + .segbtn { border-left: 1px solid rgba(120,160,255,0.3); }
  .segbtn.on { background: linear-gradient(135deg,#5b8bff,#7a5bff); color: #fff; font-weight: 600; }
  .segbtn:not(.on):hover { background: rgba(120,160,255,0.18); }
  input[type=range] { flex: 1.4; accent-color: #ffd86b; }
  #play {
    width: 100%; margin-top: 6px; padding: 9px; font-size: 14px; font-weight: 600;
    background: linear-gradient(135deg,#5b8bff,#7a5bff); border: none; color: white;
    border-radius: 10px; cursor: pointer;
  }
  #play:hover { filter: brightness(1.1); }
  .note { font-size: 11px; color: #ffd86b; margin-top: 12px; line-height: 1.55; border-top: 1px solid rgba(120,160,255,0.2); padding-top: 10px; }
  .actions { display: flex; gap: 6px; margin: 6px 0 12px; }
  .actions button { flex: 1; background: rgba(120,160,255,0.18); border: 1px solid rgba(120,160,255,0.4);
    color: #dfe6ff; border-radius: 8px; padding: 8px 6px; font-size: 12px; cursor: pointer; transition: background .15s; }
  .actions button:hover { background: rgba(120,160,255,0.35); }
  #toast { position: fixed; left: 50%; bottom: 60px; transform: translateX(-50%); z-index: 30;
    background: rgba(20,28,55,0.96); border: 1px solid rgba(120,160,255,0.5); color: #eaf0ff;
    padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 6px 22px rgba(0,0,0,0.5); }
  #toast.show { opacity: 1; }
  .search { display: flex; gap: 6px; margin: 4px 0 12px; }
  #searchInput { flex: 1; min-width: 0; background: rgba(8,12,26,0.9); border: 1px solid rgba(120,160,255,0.4);
    color: #eaf0ff; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  #searchInput::placeholder { color: #7d8cb5; }
  #searchClear { background: rgba(120,160,255,0.18); border: 1px solid rgba(120,160,255,0.4); color: #cdd8f5;
    border-radius: 8px; width: 34px; cursor: pointer; font-size: 13px; }
  #searchClear:hover { background: rgba(120,160,255,0.35); }
  .clock { font-size: 12px; color: #ffd86b; margin: 2px 0 6px; font-variant-numeric: tabular-nums; }
  .event { font-size: 11.5px; color: #ffacd8; margin: 0 0 8px; padding: 4px 8px;
    background: rgba(120,80,140,0.22); border: 1px solid rgba(255,140,200,0.4); border-radius: 6px;
    line-height: 1.4; }
  .datetime { display: flex; gap: 6px; margin: 0 0 12px; }
  .datetime input { flex: 1; min-width: 0; background: rgba(8,12,26,0.9); border: 1px solid rgba(120,160,255,0.4);
    color: #eaf0ff; border-radius: 8px; padding: 6px 8px; font-size: 12px; }
  .datetime input::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
  #nowBtn { background: rgba(120,160,255,0.18); border: 1px solid rgba(120,160,255,0.4); color: #cdd8f5;
    border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  #nowBtn:hover { background: rgba(120,160,255,0.35); }
  .tip { position: fixed; z-index: 20; pointer-events: none; opacity: 0; transition: opacity .1s;
    background: rgba(10,14,30,0.92); border: 1px solid rgba(140,180,255,0.5); color: #eef3ff;
    font-size: 12.5px; padding: 4px 9px; border-radius: 7px; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,0.5); }

  /* Hamburger button — visible on small screens to collapse/expand the panel */
  #panelToggle {
    position: fixed; top: 12px; left: 12px; z-index: 12;
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(12,16,32,0.85); border: 1px solid rgba(120,160,255,0.4);
    color: #dfe6ff; font-size: 20px; line-height: 1; cursor: pointer; display: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
  }
  #panelToggle:hover { background: rgba(20,28,55,0.95); }
  #ui.hidden { display: none; }

  @media (max-width: 720px) {
    #panelToggle { display: block; }
    #ui {
      top: 64px; left: 12px; right: 12px; width: auto; max-width: 380px;
      max-height: calc(100vh - 78px); overflow-y: auto;
      padding: 14px 16px; border-radius: 12px;
    }
    #ui h1 { font-size: 15px; }
    #ui p.sub { font-size: 11px; }
    .row { font-size: 13px; padding: 2px 0; }
    button.toggle { min-height: 34px; min-width: 60px; padding: 7px 10px; }
    .segbtn { padding: 12px 4px; font-size: 13px; }
    #play { padding: 12px; font-size: 15px; }
    #searchInput, .datetime input { padding: 10px 10px; font-size: 14px; }
    #searchClear, #nowBtn { min-height: 38px; min-width: 40px; }
    #hint { font-size: 10.5px; padding: 5px 10px; bottom: 8px; max-width: calc(100vw - 80px); white-space: normal; text-align: center; }
  }
  #hint { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
    font-size: 11.5px; color: #8b9bc4; background: rgba(12,16,32,0.6); padding: 6px 14px; border-radius: 20px; }
  .label {
    position: fixed; transform: translate(-50%, -130%); pointer-events: none;
    font-size: 12px; color: #fff; text-shadow: 0 0 6px rgba(0,0,0,0.9); white-space: nowrap;
    z-index: 5; transition: opacity .2s;
  }
  .label.star { color: #ffe9a8; font-weight: 600; }
  /* Contextual toggle visibility — keyed off body.is-{space,japan,solar} and
     .observer-{earth,other} so each toggle only shows where it makes sense. */
  .obs-only { display: flex; }
  body.is-japan .obs-only { display: none; }
  .japan-only, .sky-only, .earth-only, .solar-only { display: none; }
  body.is-solar .solar-only { display: flex; }
  body.is-japan .japan-only,
  body.is-japan .sky-only,
  body.is-space .sky-only,
  body.is-japan .earth-only,
  body.is-space.observer-earth .earth-only { display: flex; }
  #solarObserver { flex: 1.2; min-width: 0; background: rgba(8,12,26,0.9); border: 1px solid rgba(120,160,255,0.4);
    color: #eaf0ff; border-radius: 8px; padding: 7px 8px; font-size: 13px; }
  .label.compass { font-size: 18px; font-weight: 700; letter-spacing: 0.12em;
    text-shadow: 0 0 8px rgba(0,0,0,0.95), 0 0 2px rgba(0,0,0,1); }
</style>
</head>
<body>
<div id="app"></div>
<button id="panelToggle" aria-label="メニュー">☰</button>
<div id="ui">
  <h1>🌌 宮古島の星空シミュレータ</h1>
  <p class="sub">日付・時刻を指定して、その瞬間の宮古島の空を再現します。星座・惑星・月相を検索でジャンプ。</p>
  <div class="actions">
    <button id="shareBtn" title="この日時・ビューのリンクをクリップボードへ">🔗 シェア</button>
    <button id="screenshotBtn" title="今の見た目を PNG で保存">📷 保存</button>
  </div>
  <div class="seg">
    <button id="viewSpace" class="segbtn on">🛰 宇宙</button>
    <button id="viewJapan" class="segbtn">🗾 日本</button>
    <button id="viewSolar" class="segbtn">☀ 太陽系</button>
  </div>
  <div class="search">
    <input id="searchInput" list="constList" placeholder="🔍 星座を検索（例: オリオン座）" autocomplete="off" aria-label="星座を検索" />
    <button id="searchClear" title="ハイライト解除">✕</button>
  </div>
  <div class="row">
    <label for="historySelect" title="歴史的天文事件">📜 天文史</label>
    <select id="historySelect" aria-label="歴史的天文事件">
      <option value="">— 選んでジャンプ —</option>
    </select>
  </div>
  <div class="row">
    <label>🎵 音響</label>
    <button class="toggle" id="audioBtn">OFF</button>
  </div>
  <div class="row">
    <label>❓ 観測クイズ</label>
    <button id="quizBtn" class="toggle">スタート</button>
  </div>
  <datalist id="constList"></datalist>
  <div class="clock" id="clockText" title="宮古島 24.74°N, 125.28°E">📍 宮古島</div>
  <div class="event" id="eventChip" style="display:none"></div>
  <div class="datetime">
    <input type="date" id="dateInput" aria-label="日付" />
    <input type="time" id="timeInput" aria-label="時刻" />
    <button id="nowBtn" title="現在時刻にする">今</button>
  </div>
  <button id="play">⏸ 一時停止</button>
  <div class="row earth-only">
    <label for="locationSelect">📍 観測地</label>
    <select id="locationSelect" aria-label="観測地">
      <option value="miyako">宮古島</option>
      <option value="naha">那覇</option>
      <option value="fukuoka">福岡</option>
      <option value="osaka">大阪</option>
      <option value="tokyo">東京</option>
      <option value="sapporo">札幌</option>
      <option value="seoul">ソウル</option>
      <option value="beijing">北京</option>
      <option value="honolulu">ホノルル</option>
      <option value="la">ロサンゼルス</option>
      <option value="nyc">ニューヨーク</option>
      <option value="london">ロンドン</option>
      <option value="paris">パリ</option>
      <option value="sydney">シドニー</option>
      <option value="rio">リオデジャネイロ</option>
      <option value="equator">🟢 赤道（ガラパゴス）</option>
      <option value="npole">⬆ 北極点</option>
      <option value="spole">⬇ 南極点</option>
      <option value="gps">📡 GPSで現在地</option>
    </select>
  </div>
  <div class="row obs-only">
    <label for="solarObserver">観測地点</label>
    <select id="solarObserver" aria-label="観測地点">
      <option value="overview">🛰 太陽系全体</option>
      <option value="Sun">☀ 太陽から</option>
      <option value="Mercury">水星から</option>
      <option value="Venus">金星から</option>
      <option value="Earth">地球から</option>
      <option value="Moon">🌙 月から</option>
      <option value="Mars">火星から</option>
      <option value="Jupiter">木星から</option>
      <option value="Saturn">土星から</option>
      <option value="Uranus">天王星から</option>
      <option value="Neptune">海王星から</option>
      <option value="Pluto">冥王星から</option>
    </select>
  </div>
  <div class="row">
    <label for="speed">時間の速さ</label>
    <input id="speed" type="range" min="0" max="100" value="5" aria-label="時間の速さ" />
  </div>
  <div class="row earth-only">
    <label>自転軸を表示</label>
    <button class="toggle on" id="axisBtn">ON</button>
  </div>
  <div class="row earth-only">
    <label>こぐま座を表示</label>
    <button class="toggle on" id="umiBtn">ON</button>
  </div>
  <div class="row sky-only">
    <label>北の星座を表示</label>
    <button class="toggle on" id="constBtn">ON</button>
  </div>
  <div class="row sky-only">
    <label>全天の明るい星座</label>
    <button class="toggle on" id="skyBtn">ON</button>
  </div>
  <div class="row sky-only">
    <label>春夏冬の大三角</label>
    <button class="toggle" id="triBtn">OFF</button>
  </div>
  <div class="row sky-only">
    <label>天の川</label>
    <button class="toggle on" id="mwBtn">ON</button>
  </div>
  <div class="row sky-only">
    <label>黄道（惑星の道）</label>
    <button class="toggle" id="trailBtn">OFF</button>
  </div>
  <div class="row sky-only">
    <label>惑星の軌跡</label>
    <button class="toggle" id="planetPathBtn">OFF</button>
  </div>
  <div class="row sky-only">
    <label>流れ星</label>
    <button class="toggle" id="meteorBtn">OFF</button>
  </div>
  <div class="row sky-only">
    <label>歳差の軌跡（2.6万年）</label>
    <button class="toggle" id="precessionBtn">OFF</button>
  </div>
  <div class="row sky-only">
    <label>有名な彗星</label>
    <button class="toggle" id="cometsBtn">OFF</button>
  </div>
  <div class="row sky-only">
    <label>アポロ着陸点</label>
    <button class="toggle" id="apolloBtn">OFF</button>
  </div>
  <div class="row solar-only">
    <label>小惑星帯</label>
    <button class="toggle" id="asteroidsBtn">OFF</button>
  </div>
  <div class="row solar-only">
    <label>カイパーベルト</label>
    <button class="toggle" id="kuiperBtn">OFF</button>
  </div>
  <div class="row earth-only">
    <label>地軸の傾き(23.4°)</label>
    <button class="toggle" id="tiltBtn">OFF</button>
  </div>
  <div class="row japan-only">
    <label>地面（日本視点）</label>
    <button class="toggle on" id="groundBtn">ON</button>
  </div>
  <div class="row japan-only">
    <label for="lightPol">光害の強さ</label>
    <input id="lightPol" type="range" min="0" max="100" value="15" aria-label="光害の強さ" />
  </div>
  <div class="row solar-only">
    <label>公転軌道</label>
    <button class="toggle on" id="orbitBtn">ON</button>
  </div>
  <div class="note">💡 検索ボックスに「新月 / 三日月 / 上弦の月 / 満月 / 下弦の月」と入れるとその月相の日時へジャンプ。「月」「木星」「土星」など天体名・星座名でも検索できます。</div>
</div>
<div id="hint">🖱 ドラッグ=視点回転 / ホイール=ズーム</div>
<div id="tip" class="tip"></div>
<div id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==ASTRO_INLINE_START== (generated from astro.js by `node build.js` — do not edit between the markers)
// astro.js — pure, dependency-free astronomy & math helpers + star data.
// No THREE.js, no DOM: everything here is unit-testable in plain Node.
// Vectors are plain {x, y, z}. The viewer (index.html) wraps these into THREE.Vector3.

// ---------------------------------------------------------------------------
// Coordinate conversion
// ---------------------------------------------------------------------------

// Celestial coords (RA in hours, Dec in degrees) -> point {x,y,z} on a sphere of
// radius D. Dec +90° maps to +Y (the pole), so everything pivots around the axis.
// (Returns a plain object; the viewer wraps it into a THREE.Vector3.)
function raDecToXYZ(raHours, decDeg, D = 1) {
  const ra = raHours * 15 * Math.PI / 180;
  const dec = decDeg * Math.PI / 180;
  const h = D * Math.cos(dec);
  return { x: h * Math.cos(ra), y: D * Math.sin(dec), z: h * Math.sin(ra) };
}

function length3(v) { return Math.hypot(v.x, v.y, v.z); }

// ---------------------------------------------------------------------------
// Star naming
// ---------------------------------------------------------------------------

const GREEK = {
  alpha: 'α', beta: 'β', gamma: 'γ', delta: 'δ', epsilon: 'ε', eps: 'ε', zeta: 'ζ', eta: 'η',
  theta: 'θ', iota: 'ι', kappa: 'κ', lambda: 'λ', mu: 'μ', nu: 'ν', xi: 'ξ', pi: 'π',
  sigma: 'σ', tau: 'τ', upsilon: 'υ', phi: 'φ', chi: 'χ', psi: 'ψ', omega: 'ω'
};

const PROPER = {
  dubhe: 'ドゥーベ', merak: 'メラク', phecda: 'フェクダ', megrez: 'メグレズ', alioth: 'アリオト', mizar: 'ミザール', alkaid: 'アルカイド',
  caph: 'カフ', schedar: 'シェダル', ruchbah: 'ルクバー', segin: 'セギン',
  betelgeuse: 'ベテルギウス', rigel: 'リゲル', bellatrix: 'ベラトリックス', saiph: 'サイフ', alnitak: 'アルニタク', alnilam: 'アルニラム', mintaka: 'ミンタカ',
  sirius: 'シリウス', mirzam: 'ミルザム', wezen: 'ウェズン', adhara: 'アダラ', aludra: 'アルドラ',
  procyon: 'プロキオン', gomeisa: 'ゴメイサ',
  castor: 'カストル', pollux: 'ポルックス', alhena: 'アルヘナ', wasat: 'ワサト', mebsuta: 'メブスタ', tejat: 'テジャト',
  aldebaran: 'アルデバラン', elnath: 'エルナト',
  regulus: 'レグルス', denebola: 'デネボラ',
  vega: 'ベガ（織姫）',
  altair: 'アルタイル（彦星）', tarazed: 'タラゼド', alshain: 'アルシャイン',
  deneb: 'デネブ', sadr: 'サドル', albireo: 'アルビレオ', gienah: 'ギェナー',
  antares: 'アンタレス',
  markab: 'マルカブ', scheat: 'シェアト', algenib: 'アルゲニブ', alpheratz: 'アルフェラッツ', enif: 'エニフ',
  eltanin: 'エルタニン', rastaban: 'ラスタバン', grumium: 'グルミウム', thuban: 'トゥバン',
  hamal: 'ハマル', sheratan: 'シェラタン', mesarthim: 'メサルティム', spica: 'スピカ', arcturus: 'アークトゥルス'
};

const ABBR = {
  'おおぐま座（北斗七星）': 'UMa', 'カシオペヤ座': 'Cas', 'ケフェウス座': 'Cep', 'りゅう座': 'Dra', 'こぐま座': 'UMi',
  'オリオン座': 'Ori', 'おおいぬ座': 'CMa', 'こいぬ座': 'CMi', 'ふたご座': 'Gem', 'おうし座': 'Tau', 'しし座': 'Leo',
  'こと座': 'Lyr', 'わし座': 'Aql', 'はくちょう座': 'Cyg', 'さそり座': 'Sco', 'ペガスス座': 'Peg',
  'おひつじ座': 'Ari', 'かに座': 'Cnc', 'おとめ座': 'Vir', 'てんびん座': 'Lib', 'いて座（南斗）': 'Sgr',
  'やぎ座': 'Cap', 'みずがめ座': 'Aqr', 'うお座': 'Psc', 'うしかい座': 'Boo'
};

// Resolve a display name for a star: proper/Japanese name (+ Bayer designation when
// known), else Greek letter + constellation abbreviation, else the raw key.
function starName(constName, key, names) {
  const greek = GREEK[key];
  const abbr = ABBR[constName] || constName;
  const proper = (names && names[key]) || PROPER[key];
  if (proper) return greek ? `${proper}（${greek} ${abbr}）` : proper;
  return greek ? `${greek} ${abbr}` : key;
}

// ---------------------------------------------------------------------------
// Search
// ---------------------------------------------------------------------------

// Find the best matching constellation name for a query (exact, then partial,
// tolerant of the trailing '座'). Returns the matched name or null.
function searchMatch(query, names) {
  const q = (query || '').trim();
  if (!q) return null;
  if (names.includes(q)) return q;
  const key = q.replace('座', '');
  return names.find((n) => n.includes(q) || n.replace('座', '').includes(key)) || null;
}

// ---------------------------------------------------------------------------
// Observer / horizon geometry
// ---------------------------------------------------------------------------

// Altitude of the celestial pole above the horizon equals the observer's latitude.
function poleAltitude(latDeg) { return latDeg; }

// A star is circumpolar (never sets) at latitude lat when dec > 90 - |lat|.
function isCircumpolar(decDeg, latDeg) { return decDeg > 90 - Math.abs(latDeg); }

// Below the local horizon iff the local-up component is negative.
function belowHorizon(localY) { return localY < 0; }

// Local "north on the ground" = the celestial axis (+Y) projected onto the tangent
// plane at `up`. Returns a unit vector. (up must be a unit vector.)
function observerNorth(up) {
  const dotY = up.y;
  let nx = -dotY * up.x, ny = 1 - dotY * up.y, nz = -dotY * up.z;
  const nl = Math.hypot(nx, ny, nz) || 1;
  return { x: nx / nl, y: ny / nl, z: nz / nl };
}

// Given a target expressed in the observer's local frame (x=east, y=up, z=south),
// return the yaw/pitch that aims the camera (-Z = north) at it. Pitch is clamped.
function aimYawPitch(v) {
  const len = Math.hypot(v.x, v.y, v.z) || 1;
  const pitch = Math.asin(Math.max(-1, Math.min(1, v.y / len)));
  return {
    yaw: Math.atan2(-v.x, -v.z),
    pitch: Math.max(-1.45, Math.min(1.45, pitch))
  };
}

// Shortest signed angular difference (radians) for smooth yaw interpolation.
function shortestAngle(target, current) {
  const d = target - current;
  return Math.atan2(Math.sin(d), Math.cos(d));
}

// ---------------------------------------------------------------------------
// Solar system / orbital motion
// ---------------------------------------------------------------------------

// Kepler's third law: orbital angular speed ∝ a^(-3/2), normalized so Earth = 1.
function keplerRelSpeed(aAU) { return Math.pow(aAU, -1.5); }

// Compressed display radius so inner & outer planets all fit on screen.
function orbitDisplayRadius(aAU, scale = 3) { return Math.pow(aAU, 0.5) * scale; }

// Position on a flat circular orbit in the XZ plane.
function planetXZ(angle, orbit) {
  return { x: Math.cos(angle) * orbit, z: Math.sin(angle) * orbit };
}

// With Earth advancing `earthStep` radians per frame at `fps`, how many real
// seconds does one Earth year take on screen?
function yearSeconds(earthStep, fps = 60) {
  return (2 * Math.PI / earthStep) / fps;
}

// Time-compression factor: real seconds in a year ÷ on-screen seconds per year.
function speedupFactor(earthStep, fps = 60) {
  return (365.25 * 86400) / yearSeconds(earthStep, fps);
}

// ===========================================================================
// Ephemeris: faithful Sun / Moon / planet positions and sidereal time.
// Accuracy ~arcmin–degree (Standish low-precision elements, valid ~1800–2050);
// plenty for "which star/planet is where in the sky tonight".
// ===========================================================================

// Observer location. 宮古島 (Miyako-jima): 24.74°N, 125.28°E.
const MIYAKO = { name: '宮古島', latDeg: 24.74, lonEastDeg: 125.28 };

const RAD = Math.PI / 180;
const toRad = (d) => d * RAD;
const toDeg = (r) => r / RAD;
const norm360 = (d) => ((d % 360) + 360) % 360;
const norm24 = (h) => ((h % 24) + 24) % 24;

// Julian Day from a JS Date (uses its absolute UTC instant) and back.
function julianDay(date) { return date.getTime() / 86400000 + 2440587.5; }
function jdToDate(jd) { return new Date((jd - 2440587.5) * 86400000); }
function centuriesSinceJ2000(jd) { return (jd - 2451545.0) / 36525; }

// Greenwich Mean Sidereal Time (degrees, 0–360).
function gmstDeg(jd) {
  const d = jd - 2451545.0;
  return norm360(280.46061837 + 360.98564736629 * d);
}
// Local Sidereal Time (degrees) at an east longitude = RA currently on the meridian.
function lstDeg(jd, lonEastDeg) { return norm360(gmstDeg(jd) + lonEastDeg); }

const obliquityRad = (jd) => toRad(23.439291 - 0.0130042 * centuriesSinceJ2000(jd));

// Rotate an ecliptic (J2000) vector to equatorial and read off RA(hours)/Dec(deg).
function eclVecToEqu(x, y, z, jd) {
  const eps = obliquityRad(jd);
  const ce = Math.cos(eps), se = Math.sin(eps);
  const xe = x, ye = y * ce - z * se, ze = y * se + z * ce;
  return {
    ra: norm24(toDeg(Math.atan2(ye, xe)) / 15),
    dec: toDeg(Math.atan2(ze, Math.hypot(xe, ye))),
    dist: Math.hypot(x, y, z)
  };
}

// Convert ecliptic lon/lat (radians) to RA(hours)/Dec(deg).
function eclipticToEquatorial(lonRad, latRad, jd) {
  const eps = obliquityRad(jd);
  const sl = Math.sin(lonRad), cl = Math.cos(lonRad), tb = Math.tan(latRad);
  return {
    ra: norm24(toDeg(Math.atan2(sl * Math.cos(eps) - tb * Math.sin(eps), cl)) / 15),
    dec: toDeg(Math.asin(Math.sin(latRad) * Math.cos(eps) + Math.cos(latRad) * Math.sin(eps) * sl))
  };
}

  Jupiter: { a: [5.20288700, -0.00011607], e: [0.04838624, -0.00013253], I: [1.30439695, -0.00183714], L: [34.39644051, 3034.74612775], w: [14.72847983, 0.21252668], O: [100.47390909, 0.20469106] },
  Saturn:  { a: [9.53667594, -0.00125060], e: [0.05386179, -0.00050991], I: [2.48599187, 0.00193609], L: [49.95424423, 1222.49362201], w: [92.59887831, -0.41897216], O: [113.66242448, -0.28867794] },
  Uranus:  { a: [19.18916464, -0.00196176], e: [0.04725744, -0.00004397], I: [0.77263783, -0.00242939], L: [313.23810451, 428.48202785], w: [170.95427630, 0.40805281], O: [74.01692503, 0.04240589] },
  Neptune: { a: [30.06992276, 0.00026291], e: [0.00859048, 0.00005105], I: [1.77004347, 0.00035372], L: [-55.12002969, 218.45945325], w: [44.96476227, -0.32241464], O: [131.78422574, -0.00508664] }
};

function solveKepler(Mdeg, e) {
  const eStar = e / RAD; // e in degrees
  let E = Mdeg + eStar * Math.sin(toRad(Mdeg));
  for (let i = 0; i < 12; i++) {
    const dM = Mdeg - (E - eStar * Math.sin(toRad(E)));
    const dE = dM / (1 - e * Math.cos(toRad(E)));
    E += dE;
    if (Math.abs(dE) < 1e-8) break;
  }
  return E;
}

// Heliocentric J2000 ecliptic position (AU) for a planet at T centuries past J2000.
function helioEcl(el, T) {
  const a = el.a[0] + el.a[1] * T;
  const e = el.e[0] + el.e[1] * T;
  const I = el.I[0] + el.I[1] * T;
  const L = el.L[0] + el.L[1] * T;
  const wbar = el.w[0] + el.w[1] * T;
  const Om = el.O[0] + el.O[1] * T;
  const w = wbar - Om;
  let M = norm360(L - wbar); if (M > 180) M -= 360;
  const E = solveKepler(M, e);
  const xp = a * (Math.cos(toRad(E)) - e);
  const yp = a * Math.sqrt(1 - e * e) * Math.sin(toRad(E));
  const cw = Math.cos(toRad(w)), sw = Math.sin(toRad(w));
  const cO = Math.cos(toRad(Om)), sO = Math.sin(toRad(Om));
  const cI = Math.cos(toRad(I)), sI = Math.sin(toRad(I));
  return {
    x: (cw * cO - sw * sO * cI) * xp + (-sw * cO - cw * sO * cI) * yp,
    y: (cw * sO + sw * cO * cI) * xp + (-sw * sO + cw * cO * cI) * yp,
    z: (sw * sI) * xp + (cw * sI) * yp
  };
}

// Geocentric equatorial RA(hours)/Dec(deg) for a planet (key = English name).
function planetEqu(name, jd) {
  const T = centuriesSinceJ2000(jd);
  const p = helioEcl(ELEMENTS[name], T);
  const earth = helioEcl(ELEMENTS.Earth, T);
  return eclVecToEqu(p.x - earth.x, p.y - earth.y, p.z - earth.z, jd);
}

// Geocentric Sun: the Sun is opposite the Earth's heliocentric position.
function sunEqu(jd) {
  const e = helioEcl(ELEMENTS.Earth, centuriesSinceJ2000(jd));
  return eclVecToEqu(-e.x, -e.y, -e.z, jd);
}

// Geocentric Moon (low-precision series, ~0.1–0.3° accuracy).
function moonEqu(jd) {
  const T = centuriesSinceJ2000(jd);
  const Lp = 218.3164477 + 481267.88123421 * T;
  const D = toRad(297.8501921 + 445267.1114034 * T);
  const M = toRad(357.5291092 + 35999.0502909 * T);
  const Mp = toRad(134.9633964 + 477198.8675055 * T);
  const F = toRad(93.2720950 + 483202.0175233 * T);
  const lon = Lp
    + 6.289 * Math.sin(Mp)
    + 1.274 * Math.sin(2 * D - Mp)
    + 0.658 * Math.sin(2 * D)
    + 0.214 * Math.sin(2 * Mp)
    - 0.186 * Math.sin(M)
    - 0.114 * Math.sin(2 * F);
  const lat = 5.128 * Math.sin(F)
    + 0.281 * Math.sin(Mp + F)
    + 0.278 * Math.sin(F - Mp)
    + 0.173 * Math.sin(2 * D - F);
  return eclipticToEquatorial(toRad(norm360(lon)), toRad(lat), jd);
}

// Approximate Moon phase: 0=new, 0.5=full (illuminated fraction grows then shrinks).
function moonPhase(jd) {
  const T = centuriesSinceJ2000(jd);
  const D = norm360(297.8501921 + 445267.1114034 * T); // mean elongation Sun–Moon
  return { elongationDeg: D, illuminated: (1 - Math.cos(toRad(D))) / 2 };
}

// Find the next Julian Day after `jdStart` at which the Sun-Moon elongation
// hits `targetDeg`: 0 = new moon, 90 = first quarter, 180 = full, 270 = last.
// Scans in half-day steps then bisects to ~minute precision.
function nextLunarPhase(jdStart, targetDeg) {
  const diff = (jd) => ((moonPhase(jd).elongationDeg - targetDeg + 540) % 360) - 180;
  const STEP = 0.5;
  let prevJd = jdStart, prevD = diff(jdStart);
  for (let i = 1; i <= 80; i++) { // up to 40 days (synodic month ~29.5)
    const jd = jdStart + i * STEP;
    const d = diff(jd);
    if (prevD < 0 && d >= 0) {
      let lo = prevJd, hi = jd;
      for (let k = 0; k < 30; k++) {
        const mid = (lo + hi) / 2;
        if (diff(mid) < 0) lo = mid; else hi = mid;
      }
      return (lo + hi) / 2;
    }
    prevJd = jd; prevD = d;
  }
  return null;
}

// Pretty emoji + label for the current moon phase.
function moonPhaseLabel(jd) {
  const D = moonPhase(jd).elongationDeg;
  if (D < 22.5 || D >= 337.5) return { emoji: '🌑', name: '新月' };
  if (D < 67.5)  return { emoji: '🌒', name: '三日月' };
  if (D < 112.5) return { emoji: '🌓', name: '上弦の月' };
  if (D < 157.5) return { emoji: '🌔', name: '十三夜月' };
  if (D < 202.5) return { emoji: '🌕', name: '満月' };
  if (D < 247.5) return { emoji: '🌖', name: '十六夜' };
  if (D < 292.5) return { emoji: '🌗', name: '下弦の月' };
  return { emoji: '🌘', name: '有明月' };
}

// Convenience: all sky bodies (Sun, Moon, naked-eye + outer planets) for a date.
// Returns [{ key, jp, ra, dec, kind, color }].
const SKY_BODIES = [
  { key: 'Sun',     jp: '太陽', kind: 'sun',    color: 0xffd14d },
  { key: 'Moon',    jp: '月',   kind: 'moon',   color: 0xdfe6f0 },
  { key: 'Mercury', jp: '水星', kind: 'planet', color: 0xb0a090 },
  { key: 'Venus',   jp: '金星', kind: 'planet', color: 0xe8d8a0 },
  { key: 'Earth',   jp: '地球', kind: 'planet', color: 0x4a90e2 },
  { key: 'Mars',    jp: '火星', kind: 'planet', color: 0xd0552f },
  { key: 'Jupiter', jp: '木星', kind: 'planet', color: 0xd9b58a },
  { key: 'Saturn',  jp: '土星', kind: 'planet', color: 0xe3d6a6 },

  { key: 'Neptune', jp: '海王星', kind: 'planet', color: 0x5878e6 }
];

function bodyEqu(key, jd) {
  if (key === 'Sun') return sunEqu(jd);
  if (key === 'Moon') return moonEqu(jd);
  return planetEqu(key, jd);
}

// Heliocentric ecliptic xyz (AU) for any sky body — used to swap the observer.
function helio(key, jd) {
  const T = centuriesSinceJ2000(jd);
  if (key === 'Sun') return { x: 0, y: 0, z: 0 };
  if (key === 'Moon') {
    const earth = helioEcl(ELEMENTS.Earth, T);
    const Lp = 218.3164477 + 481267.88123421 * T;
    const D = toRad(297.8501921 + 445267.1114034 * T);
    const M = toRad(357.5291092 + 35999.0502909 * T);
    const Mp = toRad(134.9633964 + 477198.8675055 * T);
    const F = toRad(93.2720950 + 483202.0175233 * T);
    const lon = toRad(norm360(Lp + 6.289 * Math.sin(Mp) + 1.274 * Math.sin(2 * D - Mp) + 0.658 * Math.sin(2 * D)
      + 0.214 * Math.sin(2 * Mp) - 0.186 * Math.sin(M) - 0.114 * Math.sin(2 * F)));
    const lat = toRad(5.128 * Math.sin(F) + 0.281 * Math.sin(Mp + F) + 0.278 * Math.sin(F - Mp) + 0.173 * Math.sin(2 * D - F));
    const dist = 0.00257; // ~1 lunar distance in AU
    return {
      x: earth.x + dist * Math.cos(lat) * Math.cos(lon),
      y: earth.y + dist * Math.cos(lat) * Math.sin(lon),
      z: earth.z + dist * Math.sin(lat)
    };
  }
  return ELEMENTS[key] ? helioEcl(ELEMENTS[key], T) : { x: 0, y: 0, z: 0 };
}

// Apparent RA/Dec of a target body as seen from an observer body.
// observerKey === targetKey → null (you can't see your own home).
function bodyEquFrom(targetKey, jd, observerKey = 'Earth') {
  if (targetKey === observerKey) return null;
  const o = helio(observerKey, jd);
  const t = helio(targetKey, jd);
  const e = obliquityRad(jd); const ce = Math.cos(e), se = Math.sin(e);
  const dx = t.x - o.x, dy = t.y - o.y, dz = t.z - o.z;
  const xe = dx, ye = dy * ce - dz * se, ze = dy * se + dz * ce;
  return {
    ra: norm24(toDeg(Math.atan2(ye, xe)) / 15),
    dec: toDeg(Math.atan2(ze, Math.hypot(xe, ye))),
    dist: Math.hypot(dx, dy, dz)
  };
}

// ---------------------------------------------------------------------------
// 二十四節気 (24 solar terms) & 月齢 (moon age)
// ---------------------------------------------------------------------------

// Geocentric ecliptic longitude of the Sun (degrees, 0–360). 0° = vernal equinox.
function sunEclipticLon(jd) {
  const T = centuriesSinceJ2000(jd);
  const e = helioEcl(ELEMENTS.Earth, T);
  return norm360(toDeg(Math.atan2(-e.y, -e.x)));
}

// 24 solar terms — each at a sun-ecliptic-longitude multiple of 15°. The cycle
// starts at 立春 (lon=315°) by Chinese-Japanese convention; ordering here uses
// the modern Japanese listing that begins with 立春 in early February.
const SOLAR_TERMS = [
  { lon: 315, name: '立春',   season: '春' }, { lon: 330, name: '雨水',   season: '春' },
  { lon: 345, name: '啓蟄',   season: '春' }, { lon:   0, name: '春分',   season: '春' },
  { lon:  15, name: '清明',   season: '春' }, { lon:  30, name: '穀雨',   season: '春' },
  { lon:  45, name: '立夏',   season: '夏' }, { lon:  60, name: '小満',   season: '夏' },
  { lon:  75, name: '芒種',   season: '夏' }, { lon:  90, name: '夏至',   season: '夏' },
  { lon: 105, name: '小暑',   season: '夏' }, { lon: 120, name: '大暑',   season: '夏' },
  { lon: 135, name: '立秋',   season: '秋' }, { lon: 150, name: '処暑',   season: '秋' },
  { lon: 165, name: '白露',   season: '秋' }, { lon: 180, name: '秋分',   season: '秋' },
  { lon: 195, name: '寒露',   season: '秋' }, { lon: 210, name: '霜降',   season: '秋' },
  { lon: 225, name: '立冬',   season: '冬' }, { lon: 240, name: '小雪',   season: '冬' },
  { lon: 255, name: '大雪',   season: '冬' }, { lon: 270, name: '冬至',   season: '冬' },
  { lon: 285, name: '小寒',   season: '冬' }, { lon: 300, name: '大寒',   season: '冬' }
];

// Find the JD when the Sun first reaches `targetLonDeg` at or after jdStart.
// Half-day scan + bisection — good to ~1 minute for the 24 solar terms.
function nextSolarTerm(jdStart, targetLonDeg) {
  const diff = (jd) => ((sunEclipticLon(jd) - targetLonDeg + 540) % 360) - 180;
  const STEP = 0.5;
  let prevJd = jdStart, prevD = diff(jdStart);
  for (let i = 1; i <= 800; i++) { // up to 400 days (full annual cycle + buffer)
    const jd = jdStart + i * STEP;
    const d = diff(jd);
    if (prevD < 0 && d >= 0) {
      let lo = prevJd, hi = jd;
      for (let k = 0; k < 30; k++) {
        const mid = (lo + hi) / 2;
        if (diff(mid) < 0) lo = mid; else hi = mid;
      }
      return (lo + hi) / 2;
    }
    prevJd = jd; prevD = d;
  }
  return null;
}

// Identify the current 二十四節気 segment and the next term. Returns
// { current: { name, lon, season }, next: { name, lon, season }, daysToNext }.
function solarTerm(jd) {
  const lon = sunEclipticLon(jd);
  // Find the term whose lon is the largest <= lon (cyclically, anchored at 立春=315).
  // Cycle starts at 315 (立春). Compute "cycle position" t = (lon - 315 + 360) % 360,
  // then the current term index is floor(t / 15) and the next is +1 mod 24.
  const t = ((lon - 315) % 360 + 360) % 360;
  const idx = Math.floor(t / 15) % 24;
  const current = SOLAR_TERMS[idx];
  const next = SOLAR_TERMS[(idx + 1) % 24];
  const nextJd = nextSolarTerm(jd, next.lon);
  return { current, next, daysToNext: nextJd != null ? nextJd - jd : null };
}

// Days since the most recent new moon (0 = exactly new, up to ~29.53).
function moonAge(jd) {
  // Walk backwards until we cross a new moon. The synodic month is ~29.53 days;
  // step in 0.5-day increments looking for the sign change of (elongation - 180)
  // (we use the wrapped diff so that 0° is "new" but lies between values around 360 and 0).
  const D = (j) => moonPhase(j).elongationDeg; // 0..360
  // We define "new" as crossing from ~360 back to ~0 going forward, so going
  // backwards we're looking for the most recent J where D(J) wraps. Use a
  // monotone "phase angle" instead: subtract a steady linear drift so it's
  // strictly monotone, then bisect.
  // Simpler: scan back ≤32 days in half-day steps to find a crossing.
  let prevJ = jd, prevD = D(jd);
  for (let i = 1; i <= 66; i++) {
    const j = jd - i * 0.5;
    const d = D(j);
    // detect descending crossing from <22.5° down through 0/360 wrap up to >337.5°
    if (prevD < 180 && d > 180 && (prevD + (360 - d)) < 60) {
      // crossing somewhere in (j, prevJ); bisect on "(D + 180) mod 360 - 180" → near zero
      const wrap = (x) => ((x + 180) % 360 + 360) % 360 - 180;
      let lo = j, hi = prevJ;
      for (let k = 0; k < 30; k++) {
        const mid = (lo + hi) / 2;
        if (wrap(D(mid)) < 0) hi = mid; else lo = mid;
      }
      return jd - (lo + hi) / 2;
    }
    prevJ = j; prevD = d;
  }
  return null;
}

// ---------------------------------------------------------------------------
// 歳差運動 (Precession of the equinoxes)
// ---------------------------------------------------------------------------

// Direction of the celestial pole at epoch `jd`, expressed as a unit vector
// in the J2000 equatorial frame our scene uses (raDecToXYZ convention: +Y = pole).
// The pole drifts along a small circle of radius ε ≈ 23.44° around the ecliptic
// pole, completing one revolution in ≈ 25,772 years.
function precessionPoleDirJ2000(jd) {
  const T = (jd - 2451545.0) / 365.25; // years from J2000
  const period = 25772;
  const omega = 2 * Math.PI * T / period; // precession angle so far
  const eps = obliquityRad(2451545.0);    // use the J2000 obliquity for the small circle
  // The ecliptic pole in equatorial J2000 XYZ (our raDecToXYZ convention) sits at
  // RA = 18h (= 270° in our +X-cos / +Z-sin layout), Dec = 90° - ε. Plugging in:
  //   x = cos(Dec)cos(RA) = 0,  y = sin(Dec) = cos(ε),  z = cos(Dec)sin(RA) = -sin(ε)
  const cosE = Math.cos(eps), sinE = Math.sin(eps);
  const eclP = { x: 0, y: cosE, z: -sinE };
  // J2000 celestial pole = (0, 1, 0). Decompose into a parallel-to-eclP component +
  // a perpendicular part, then rotate the perpendicular part by ω around eclP.
  const dot = 1 * cosE; // (0,1,0) · eclP = cos(ε)
  // Perpendicular (lies in the plane through ecliptic pole tangent to the pole circle):
  const px = 0 - dot * eclP.x;
  const py = 1 - dot * eclP.y;
  const pz = 0 - dot * eclP.z;
  // A second basis vector in the small-circle plane: eclP × perp
  const bx = eclP.y * pz - eclP.z * py;
  const by = eclP.z * px - eclP.x * pz;
  const bz = eclP.x * py - eclP.y * px;
  const cosO = Math.cos(omega), sinO = Math.sin(omega);
  return {
    x: dot * eclP.x + px * cosO + bx * sinO,
    y: dot * eclP.y + py * cosO + by * sinO,
    z: dot * eclP.z + pz * cosO + bz * sinO
  };
}

// Direction of the ecliptic pole in our J2000 equatorial frame (used to draw
// the precession circle as a small circle of radius ε around this pole).
function eclipticPoleDirJ2000() {
  const eps = obliquityRad(2451545.0);
  return { x: 0, y: Math.cos(eps), z: -Math.sin(eps) };
}

// Heliocentric ecliptic XYZ (AU) of a comet at jd, using its Keplerian elements
// and time-since-perihelion (rather than mean longitude at epoch, since comet
// elements are normally tabulated relative to T_peri).
function cometHelio(c, jd) {
  const n = 2 * Math.PI / (c.period * 365.25); // mean motion (rad/day)
  const M = n * (jd - c.Tperi_jd);              // mean anomaly (rad)
  // Solve M = E − e sin E for E (Kepler's equation), radians.
  let E = M;
  for (let k = 0; k < 50; k++) {
    const dE = (M - E + c.e * Math.sin(E)) / (1 - c.e * Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-10) break;
  }
  // True anomaly v and distance r (AU)
  const v = 2 * Math.atan2(
    Math.sqrt(1 + c.e) * Math.sin(E / 2),
    Math.sqrt(1 - c.e) * Math.cos(E / 2)
  );
  const r = c.a * (1 - c.e * Math.cos(E));
  // Perifocal frame: x toward perihelion, y in the orbital plane perpendicular.
  const xp = r * Math.cos(v), yp = r * Math.sin(v);
  // Rotate to ecliptic by (ω, i, Ω) — the standard composition R_Ω · R_i · R_ω.
  const w = toRad(c.w), iR = toRad(c.i), O = toRad(c.O);
  const cw = Math.cos(w), sw = Math.sin(w);
  const cO = Math.cos(O), sO = Math.sin(O);
  const ci = Math.cos(iR), si = Math.sin(iR);
  return {
    x: (cw * cO - sw * sO * ci) * xp + (-sw * cO - cw * sO * ci) * yp,
    y: (cw * sO + sw * cO * ci) * xp + (-sw * sO + cw * cO * ci) * yp,
    z: (sw * si) * xp + (cw * si) * yp,
    r // heliocentric distance (AU) — useful for visibility / size scaling
  };
}

// Geocentric apparent RA/Dec for a comet (plus heliocentric distance & geocentric dist).
function cometEqu(c, jd) {
  const cp = cometHelio(c, jd);
  const ep = helioEcl(ELEMENTS.Earth, centuriesSinceJ2000(jd));
  const dx = cp.x - ep.x, dy = cp.y - ep.y, dz = cp.z - ep.z;
  const dist = Math.hypot(dx, dy, dz);
  const eq = eclVecToEqu(dx, dy, dz, jd);
  return { ...eq, dist, helioDist: cp.r };
}

// Convert selenographic (lat, lon in degrees) to a unit vector pointing out
// from the Moon's centre in a frame where +X=Moon's prime-meridian-equator,
// +Y=Moon's north pole, +Z=90°E equator. (Matches raDecToXYZ-style: lat→Y up.)
function moonSurfacePoint(latDeg, lonDeg, R = 1) {
  const la = toRad(latDeg), lo = toRad(lonDeg);
  return {
    x: R * Math.cos(la) * Math.cos(lo),
    y: R * Math.sin(la),
    z: R * Math.cos(la) * Math.sin(lo)
  };
}

// ---------------------------------------------------------------------------
// 月の秤動 (Lunar libration)
// ---------------------------------------------------------------------------
// The Moon's rotation is "almost" synchronous, but small periodic wobbles
// reveal ~59% of its surface over time. We model just the dominant terms:
//   - Libration in longitude L ≈ −6.29° sin(Mp) + 1.27° sin(2D − Mp)
//   - Libration in latitude  B ≈ +6.69° sin(F) (with small Mp correction)
// (Approximation of Meeus Ch. 53; accurate to ~0.3° — enough to visibly nudge
// the limb features.)
function lunarLibration(jd) {
  const T = centuriesSinceJ2000(jd);
  const D  = toRad(297.8501921 + 445267.1114034 * T); // mean elongation
  const M  = toRad(357.5291092 +  35999.0502909 * T); // Sun mean anomaly
  const Mp = toRad(134.9633964 + 477198.8675055 * T); // Moon mean anomaly
  const F  = toRad( 93.2720950 + 483202.0175233 * T); // argument of latitude
  // Dominant terms only — adding the higher-order corrections lets the sum
  // exceed the physical ±7° bound, so we keep just enough fidelity to make
  // the wobble visible without overshooting.
  const lLon = -6.29 * Math.sin(Mp) + 1.27 * Math.sin(2 * D - Mp);
  const lLat =  6.69 * Math.sin(F);
  return { lonDeg: lLon, latDeg: lLat };
}

function makeStars(count, radius) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    // uniform on sphere
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = radius * (0.85 + Math.random() * 0.15);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.cos(phi);
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const t = Math.random();
    const c = new THREE.Color().setHSL(0.6 - t*0.1, 0.3, 0.6 + Math.random()*0.4);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size: 1.1, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.9 });
  return new THREE.Points(geo, mat);
}

// Re-point the observer at any latitude/longitude on Earth. Used by the 観測地
// dropdown and the GPS option. We keep the same earth-parented rig and just
// move/orient it — the sky machinery (LST via earth rotation) updates for free.
function setLocation(latDeg, lonEastDeg, name) {
  markerLat = latDeg * Math.PI / 180;
  markerLon = lonEastDeg * Math.PI / 180;
  marker.position.set(
    R * Math.cos(markerLat) * Math.cos(markerLon),
    R * Math.sin(markerLat),
    R * Math.cos(markerLat) * Math.sin(markerLon)
  );
  // Rebuild the local basis: +Y = zenith (up), −Z = due north, +X = due east.
  const up2 = marker.position.clone().normalize();
  let north2 = new THREE.Vector3(0, 1, 0).addScaledVector(up2, -up2.y);
  // At the geographic poles the "north" tangent is undefined (zero vector);
  // fall back to a stable arbitrary tangent so the basis stays well-defined.
  if (north2.lengthSq() < 1e-8) north2.set(1, 0, 0);
  north2.normalize();
  const camBack2 = north2.clone().multiplyScalar(-1);
  const camRight2 = new THREE.Vector3().crossVectors(up2, camBack2).normalize();
  const basis2 = new THREE.Matrix4().makeBasis(camRight2, up2, camBack2);
  observerRig.position.copy(up2.clone().multiplyScalar(R));
  observerRig.quaternion.setFromRotationMatrix(basis2);
  obsYaw = 0;
  obsPitch = Math.abs(markerLat); // aim at the visible celestial pole
  applyObserverLook();
  currentLocName = name;
  clockText.title = `${name} ${Math.abs(latDeg).toFixed(2)}°${latDeg >= 0 ? 'N' : 'S'}, ${Math.abs(lonEastDeg).toFixed(2)}°${lonEastDeg >= 0 ? 'E' : 'W'}`;
  updateClockUI(julianDay(simTime));
  showToast(`📍 観測地: ${name}`);
}

  g.strokeStyle = 'rgba(8,10,8,0.95)';
  g.lineCap = 'round';
  const cx = 64, cy = 92;
  for (let i = 0; i < 9; i++) {
    const a = -Math.PI / 2 + (i - 4) * 0.38;
    const len = 42 + ((i * 7) % 11);
    g.lineWidth = 4;
    g.beginPath();
    g.moveTo(cx, cy);
    g.quadraticCurveTo(
      cx + Math.cos(a) * len * 0.5, cy + Math.sin(a) * len * 0.5 - 14,
      cx + Math.cos(a) * len,       cy + Math.sin(a) * len + 6
    );
    g.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

  const angle = Math.random() * Math.PI * 2;
  _meteorTangent.applyAxisAngle(start.clone().normalize(), angle);
  const len = 60 + Math.random() * 70;
  const end = start.clone().addScaledVector(_meteorTangent, len);

  const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
  const mat = new THREE.LineBasicMaterial({ color: 0xfff8d0, transparent: true, opacity: 1, depthTest: false });
  const line = new THREE.Line(geom, mat);
  line.renderOrder = 5;
  meteorsGroup.add(line);
  activeMeteors.push({ line, mat, life: 0, maxLife: 0.7 + Math.random() * 0.6 });
}

function updateMeteors(dt) {
  if (!meteorsGroup.visible) return;
  const shower = activeMeteorShower(simTime);
  const rate = 0.8 + (shower ? shower.intensity * 4 : 0); // boost during showers
  if (Math.random() < dt * rate) spawnMeteor();
  for (let i = activeMeteors.length - 1; i >= 0; i--) {
    const m = activeMeteors[i];
    m.life += dt;
    if (m.life >= m.maxLife) {
      meteorsGroup.remove(m.line);
      m.line.geometry.dispose();
      m.mat.dispose();
      activeMeteors.splice(i, 1);
    } else {
      m.mat.opacity = 1 - (m.life / m.maxLife);
    }
  }
}

// ---- 歳差の軌跡 (precession circle: 25,772-year wobble of the celestial pole) ----
// Draws the small circle that the north celestial pole traces among the stars,
// plus labelled markers for the pole stars of different epochs:
//   −3000 BC: Thuban (α Dra) — pyramid era's pole star
//   +500 AD:  Polaris (α UMi) approached today's spot
//   2026 AD:  now — Polaris ≈ 39′ from the true pole
//   +10000 AD: Deneb (α Cyg) sits near the pole
//   +13700 AD: Vega (α Lyr) is the future pole star
const precessionGroup = new THREE.Group();
precessionGroup.visible = false;
axisGroup.add(precessionGroup);
{
  // Draw the small circle of radius ε ≈ 23.44° around the ecliptic pole.
  const eclP = eclipticPoleDirJ2000();
  const eclVec = new THREE.Vector3(eclP.x, eclP.y, eclP.z).normalize();
  // Build an in-plane orthonormal basis (u, v) perpendicular to eclVec.
  const tmpRef = Math.abs(eclVec.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
  const u = new THREE.Vector3().crossVectors(eclVec, tmpRef).normalize();
  const v = new THREE.Vector3().crossVectors(eclVec, u).normalize();
  const R_CIRC = AXIS_LEN * 0.97;
  const eps = 23.4393 * Math.PI / 180;
  const sinE = Math.sin(eps), cosE = Math.cos(eps);
  const pts = [];
  for (let i = 0; i <= 200; i++) {
    const a = (i / 200) * Math.PI * 2;
    const r = sinE; // radius of small circle on unit sphere
    pts.push(
      new THREE.Vector3()
        .copy(eclVec).multiplyScalar(cosE * R_CIRC)
        .addScaledVector(u, r * Math.cos(a) * R_CIRC)
        .addScaledVector(v, r * Math.sin(a) * R_CIRC)
    );
  }
  const circMat = new THREE.LineBasicMaterial({ color: 0x88a8ff, transparent: true, opacity: 0.55 });
  precessionGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), circMat));

  // Era markers around the circle — name + year. Use the same precession formula
  // that returns the pole direction at each epoch so the markers actually sit on the circle.
  const ERAS = [
    { year: -2700, name: 'Thuban (トゥバン) α竜', color: '#ffd180' },
    { year: 2026,  name: '北極星 (Polaris) 今', color: '#ffffff' },
    { year: 7500,  name: 'α Cep (アルフィルク)',  color: '#9ff5ff' },
    { year: 10200, name: 'Deneb (デネブ) αハクチョウ', color: '#cfe2ff' },
    { year: 13700, name: 'Vega (ベガ/織姫) α琴', color: '#fff7a0' }
  ];
  for (const e of ERAS) {
    const jd = 2451545.0 + (e.year - 2000) * 365.25;
    const p = precessionPoleDirJ2000(jd);
    const dotPos = new THREE.Vector3(p.x, p.y, p.z).multiplyScalar(R_CIRC);
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(8, 12, 12),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(e.color) })
    );
    dot.position.copy(dotPos);
    precessionGroup.add(dot);
    const label = makeLabel(`${e.year > 0 ? '+' : ''}${e.year} ${e.name}`, '');
    label.style.color = e.color;
    label.style.fontSize = '11px';
    precessionGroup.userData.labels = precessionGroup.userData.labels || [];
    precessionGroup.userData.labels.push({ el: label, world: dotPos.clone() });
  }
}

const _issFwd = new THREE.Vector3(), _issUp = new THREE.Vector3(), _issRight = new THREE.Vector3(), _issMat = new THREE.Matrix4();
function updateISS(jd) {
  const θ = ((jd - 2451545.0) * 86400 / ISS_PERIOD_SEC) * Math.PI * 2;
  const c = Math.cos(θ), s = Math.sin(θ), si = Math.sin(ISS_INC), ci = Math.cos(ISS_INC);
  issBody.position.set(ISS_R * c, -ISS_R * s * si, ISS_R * s * ci);

  _issFwd.set(-s, -c * si, c * ci).normalize();
  _issUp.copy(issBody.position).normalize();
  _issRight.crossVectors(_issUp, _issFwd).normalize();
  _issUp.crossVectors(_issFwd, _issRight); // re-orthogonalise
  _issMat.makeBasis(_issRight, _issUp, _issFwd.negate());
  issBody.quaternion.setFromRotationMatrix(_issMat);
  issLight.visible = (performance.now() / 220 | 0) % 2 === 0; // blink
}

    const show = !isSelf;
    s.mesh.visible = show;
    if (s.glow) s.glow.visible = show;
    if (!show) { s.el.style.opacity = '0'; continue; }
    const eq = bodyEquFrom(s.key, jd, obs);
    if (!eq) { s.mesh.visible = false; if (s.glow) s.glow.visible = false; continue; }
    // From an outside observer Earth & Moon project to nearly the same spot;
    // pull Earth a touch closer so it wins the depth test.
    const r = (s.key === 'Earth' && obs !== 'Earth') ? AXIS_LEN * 0.94 : AXIS_LEN * 0.98;
    s.local.copy(raDecToVec(eq.ra, eq.dec, r));
    s.mesh.position.copy(s.local);
    if (s.glow) s.glow.position.copy(s.local);
  }
  // Everything anchored to Earth (the globe, the ISS, the spin-axis line and
  // Polaris-the-pole-star) only makes sense when we're observing FROM Earth.
  // From any other body we're not at Earth, so hide them as a group.
  const fromEarth = obs === 'Earth';
  const earthAtCenter = fromEarth && view !== 'japan';
  earthMesh.visible = earthAtCenter;
  grid.visible = earthAtCenter;
  marker.visible = earthAtCenter;
  issGroup.visible = fromEarth && view === 'space';
  axisLine.visible = axisOn && earthAtCenter;
  axisSouth.visible = axisOn && earthAtCenter;
  polaris.visible = fromEarth;
  glow.visible = fromEarth;

  // Moon phase shader: sun direction in world coords.
  const sun = skyBodies.find((s) => s.key === 'Sun');
  const moon = skyBodies.find((s) => s.key === 'Moon');
  if (sun && moon && sun.mesh.visible && moon.mesh.visible) {
    bodiesGroup.localToWorld(_sunWorld.copy(sun.local));
    bodiesGroup.localToWorld(_moonWorld.copy(moon.local));
    moonMat.uniforms.sunDir.value.copy(_sunWorld).sub(_moonWorld).normalize();
    const ph = moonPhase(jd).illuminated;
    if (moon.glow) moon.glow.material.opacity = Math.max(0.08, ph * 0.95);
    // 月の秤動 — small Euler wobble so the limb (and Apollo flags) shift
    // visibly over the synodic month, exposing the ~9% of the surface
    // that's beyond the tidally-locked "near side" centre.
    const lib = lunarLibration(jd);
    moon.mesh.rotation.set(
      lib.latDeg * Math.PI / 180,
      lib.lonDeg * Math.PI / 180,
      0
    );
  }

  // ---- 彗星: position each visible comet on the celestial sphere ----
  // Brighter (= smaller geocentric distance & smaller helio distance) → bigger head.
  if (cometsGroup.visible) {
    for (const cr of cometRenders) {
      const eq = cometEqu(cr.comet, jd);
      const pos = raDecToVec(eq.ra, eq.dec, AXIS_LEN * 0.97);
      cr.group.position.copy(pos);
      // Tail points away from the Sun on the celestial sphere — approximate as
      // the direction from the Sun's sky position to the comet's, scaled outward.
      const sunPos = sun ? sun.local.clone() : new THREE.Vector3();
      const antiSun = pos.clone().sub(sunPos).normalize();
      cr.tail.position.copy(antiSun.multiplyScalar(20));
      // Fade out distant comets so they don't litter the sky when invisible.
      const visMag = Math.max(0, 1 - (eq.dist - 1) / 8); // fades over ~8 AU
      cr.head.scale.setScalar(0.5 + visMag * 1.5);
      cr.halo.material.opacity = 0.3 + visMag * 0.5;
      cr.tail.material.opacity = visMag * 0.6;
    }
  }
}

// Cosmetic only — not real asteroid ephemerides. Uses Points (1 sprite per
// asteroid) so 600 of them stay cheap. Sits in the same view-space units as
// the planet orbits (Mars ≈ 4.9, Jupiter ≈ 7.2 — so 5.4–6.7 reads as "the belt").
function makeBelt(count, rMin, rMax, latSpreadDeg, color, size) {
  const g = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = rMin + Math.random() * (rMax - rMin);
    const a = Math.random() * Math.PI * 2;
    const lat = (Math.random() - 0.5) * 2 * latSpreadDeg * Math.PI / 180;
    positions[i * 3]     = r * Math.cos(a) * Math.cos(lat);
    positions[i * 3 + 1] = r * Math.sin(lat); // some out-of-plane scatter
    positions[i * 3 + 2] = r * Math.sin(a) * Math.cos(lat);
  }
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const m = new THREE.PointsMaterial({
    color, size, sizeAttenuation: true, transparent: true, opacity: 0.85,
    depthWrite: false
  });
  return new THREE.Points(g, m);
}

const METEOR_SHOWERS = [
  { name: 'しぶんぎ座流星群',    month: 0,  day: 4,  zhr: 110 },
  { name: '4月こと座流星群',     month: 3,  day: 22, zhr: 18 },
  { name: 'みずがめ座η流星群',   month: 4,  day: 6,  zhr: 50 },
  { name: 'みずがめ座δ流星群',   month: 6,  day: 30, zhr: 25 },
  { name: 'ペルセウス座流星群',  month: 7,  day: 13, zhr: 100 },
  { name: 'オリオン座流星群',    month: 9,  day: 21, zhr: 20 },
  { name: 'しし座流星群',        month: 10, day: 17, zhr: 15 },
  { name: 'ふたご座流星群',      month: 11, day: 14, zhr: 120 },
  { name: 'こぐま座流星群',      month: 11, day: 22, zhr: 10 }
];
function activeMeteorShower(date) {
  const y = date.getFullYear();
  for (const s of METEOR_SHOWERS) {
    const peak = new Date(y, s.month, s.day);
    const diff = Math.abs((date - peak) / 86400000);
    if (diff <= 3) return { name: s.name, intensity: Math.max(0.2, 1 - diff / 3), zhr: s.zhr };
  }
  return null;
}
function detectEclipse(jd) {
  const sun = sunEqu(jd), moon = moonEqu(jd);
  const r1 = sun.ra * Math.PI / 12, d1 = sun.dec * Math.PI / 180;
  const r2 = moon.ra * Math.PI / 12, d2 = moon.dec * Math.PI / 180;
  const dot = Math.sin(d1) * Math.sin(d2) + Math.cos(d1) * Math.cos(d2) * Math.cos(r1 - r2);
  const sep = Math.acos(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI;
  if (sep < 1.5) return { type: '🌑 日食!', sep };
  if (Math.abs(sep - 180) < 1.5) return { type: '🌕 月食!', sep: 180 - sep };
  return null;
}

// ---- 🎵 音響 — Web Audio API ambient pad + UI ping ----
// Synthesized live in-browser so there's no asset to host or load. Two soft
// detuned oscillators through a low-pass filter sound like a "cosmic drone."
let audioCtx = null, audioMaster = null, ambientGain = null;
function ensureAudio() {
  if (audioCtx) return audioCtx;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.15;
    audioMaster.connect(audioCtx.destination);
  } catch { audioCtx = null; }
  return audioCtx;
}
function startAmbient() {
  if (!ensureAudio()) { showToast('このブラウザは音響に対応していません'); return false; }
  if (ambientGain) return true;
  const ctx = audioCtx;
  ambientGain = ctx.createGain();
  ambientGain.gain.value = 0; // fade in
  ambientGain.connect(audioMaster);
  // Low-pass + slight chorus by mixing detuned oscillators.
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 800; lp.Q.value = 0.7;
  lp.connect(ambientGain);
  const freqs = [110, 165, 220, 277]; // A2, E3, A3, C#4 — Aaug-ish, slightly mystical
  for (const f of freqs) {
    const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = f; o1.detune.value = -8;
    const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f; o2.detune.value = +8;
    const og = ctx.createGain(); og.gain.value = 0.18;
    o1.connect(og); o2.connect(og); og.connect(lp);
    o1.start(); o2.start();
  }
  ambientGain.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 2);
  return true;
}
function stopAmbient() {
  if (!ambientGain || !audioCtx) return;
  const t = audioCtx.currentTime;

    const [a, b] = [...activePointers.values()];

      const dist = Cw.length() || 1;

  }
  if (cometsGroup.visible) {
    for (const cr of cometRenders) { cr.group.getWorldPosition(tmp); projectLabel(cr.el, tmp); }
  } else {
    for (const cr of cometRenders) cr.el.style.opacity = '0';
  }
  if (apolloGroup && apolloGroup.visible) {
    for (const L of apolloGroup.userData.labels) { L.dotMesh.getWorldPosition(tmp); projectLabel(L.el, tmp); }
  } else if (apolloGroup) {
    for (const L of apolloGroup.userData.labels) L.el.style.opacity = '0';
  }
  for (const s of skyBodies) {
    // updateBodies already hides the observer's own mesh; don't let projection re-show its label
    if (!s.mesh.visible) { s.el.style.opacity = '0'; continue; }
    bodiesGroup.localToWorld(tmp.copy(s.local)); projectLabel(s.el, tmp);
  }
  if (view === 'space' && _fromEarthLbl) { issBody.getWorldPosition(tmp); projectLabel(issLabel, tmp); }
  else issLabel.style.opacity = '0';
  if (view === 'japan') {
    for (const c of compassLabels) { observerRig.localToWorld(tmp.copy(c.local)); projectLabel(c.el, tmp); }
  } else {
    for (const c of compassLabels) c.el.style.opacity = '0';
  }
}
// ---- Share URL & Screenshot ----
const toast = document.getElementById('toast');
let _toastTimer = null;
function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

function buildShareURL() {
  const params = new URLSearchParams();
  params.set('d', simTime.toISOString());
  params.set('v', view);
  if (solarObserver !== 'overview' && solarObserver !== 'Earth') params.set('o', solarObserver);
  if (locationSelect.value && locationSelect.value !== 'miyako' && locationSelect.value !== 'gps') {
    params.set('loc', locationSelect.value);
  }
  return location.origin + location.pathname + '#' + params.toString();
}

document.getElementById('shareBtn').onclick = async () => {
  const url = buildShareURL();
  try {
    await navigator.clipboard.writeText(url);
    showToast('🔗 URLをコピーしました — LINEやメールで送れます');
  } catch {
    // fallback: open prompt so user can copy manually
    prompt('このURLをコピーしてください:', url);
  }
};

document.getElementById('screenshotBtn').onclick = () => {
  renderer.render(scene, activeCamera); // ensure latest frame is in buffer
  renderer.domElement.toBlob((blob) => {
    if (!blob) { showToast('スクショに失敗しました'); return; }
    const a = document.createElement('a');
    const ts = `${simTime.getFullYear()}-${String(simTime.getMonth()+1).padStart(2,'0')}-${String(simTime.getDate()).padStart(2,'0')}_${String(simTime.getHours()).padStart(2,'0')}${String(simTime.getMinutes()).padStart(2,'0')}`;
    a.href = URL.createObjectURL(blob);
    a.download = `miyako-sky_${ts}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
    showToast('📷 スクショを保存しました');
  });
};

// Apply state from URL hash (e.g. someone shared a link)
function applyURLState() {
  const hash = location.hash.replace(/^#/, '');
  if (!hash) return false;
  const params = new URLSearchParams(hash);
  let touched = false;
  if (params.has('d')) {
    const d = new Date(params.get('d'));
    if (!isNaN(d.getTime())) { simTime = d; syncInputsFromSim(); touched = true; }
  }
  if (params.has('o')) {
    solarObserver = params.get('o');
    solarObsSelect.value = solarObserver;
    applyObserverClass();
    touched = true;
  }
  if (params.has('v')) view = params.get('v'); // setView will be called next
  if (params.has('loc')) {
    const loc = LOCATIONS[params.get('loc')];
    if (loc) { setLocation(loc.lat, loc.lon, loc.name); locationSelect.value = params.get('loc'); touched = true; }
  }
  return touched;
}
applyURLState();

setView(view); // apply touch-aware hint & initial classes
tick();

function updateAspects() {
  const a = innerWidth / innerHeight;
  camera.aspect = a; camera.updateProjectionMatrix();
  observerCam.aspect = a; observerCam.updateProjectionMatrix();
}
addEventListener('resize', () => {
  updateAspects();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
